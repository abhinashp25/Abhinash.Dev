<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.15" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#grad2)" stroke="url(#grad1)" stroke-width="1.5" opacity="0.8"/>
  <!-- Corner circuit dots -->
  <circle cx="10" cy="10" r="2" fill="#6366f1" opacity="0.6"/>
  <circle cx="54" cy="10" r="2" fill="#06b6d4" opacity="0.6"/>
  <circle cx="10" cy="54" r="2" fill="#f472b6" opacity="0.6"/>
  <circle cx="54" cy="54" r="2" fill="#818cf8" opacity="0.6"/>
  <!-- Circuit lines -->
  <line x1="10" y1="10" x2="18" y2="10" stroke="#6366f1" stroke-width="0.8" opacity="0.4"/>
  <line x1="10" y1="10" x2="10" y2="18" stroke="#6366f1" stroke-width="0.8" opacity="0.4"/>
  <line x1="54" y1="10" x2="46" y2="10" stroke="#06b6d4" stroke-width="0.8" opacity="0.4"/>
  <line x1="54" y1="10" x2="54" y2="18" stroke="#06b6d4" stroke-width="0.8" opacity="0.4"/>
  <line x1="10" y1="54" x2="18" y2="54" stroke="#f472b6" stroke-width="0.8" opacity="0.4"/>
  <line x1="10" y1="54" x2="10" y2="46" stroke="#f472b6" stroke-width="0.8" opacity="0.4"/>
  <line x1="54" y1="54" x2="46" y2="54" stroke="#818cf8" stroke-width="0.8" opacity="0.4"/>
  <line x1="54" y1="54" x2="54" y2="46" stroke="#818cf8" stroke-width="0.8" opacity="0.4"/>
  <!-- AP text -->
  <text x="32" y="40" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="22" font-weight="800"
    text-anchor="middle" fill="url(#grad1)" letter-spacing="-0.5">AP</text>
</svg>
